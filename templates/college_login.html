<!DOCTYPE html>
<html>
<head>
    <title>College Login</title>
</head>
<body>

<h1>College Login</h1>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="College Email"
           required><br><br>

           name="password"
           placeholder="Password"
           required><br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
