<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login - {{ college.college_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>

    <header>
        <h1>Automatic TimeTable Generator</h1>
        <div class="nav-links">
            <a href="/college_portal/{{ college.id }}">Back to Gateway</a>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container">
            <h2 class="form-title">Faculty Secure Login</h2>
            <p class="form-subtitle">Enter your registered phone number. A simulated 4-digit OTP will be printed on the server console.</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <!-- OTP Login Option -->
            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="college_id" value="{{ college.id }}">
                <input type="hidden" name="login_type" value="otp">

                <div class="form-group">
                    <label for="phone">Phone Number (OTP Login)</label>
                    <input type="text" id="phone" name="phone" class="form-control" placeholder="e.g. 9876543210" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Send OTP Code</button>
            </form>

            <div style="text-align: center; margin: 1.5rem 0; color: var(--text-secondary); font-weight: 500;">
                — OR —
            </div>

            <!-- Password Login Option -->
            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="college_id" value="{{ college.id }}">
                <input type="hidden" name="login_type" value="password">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="e.g. jane.smith@college.edu" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem; background: linear-gradient(135deg, #a855f7, #3b82f6);">Login with Password</button>
            </form>
        </div>
    </main>

</body>
</html>
