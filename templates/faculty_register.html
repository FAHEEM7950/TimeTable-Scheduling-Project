<h1>Faculty Registration</h1>

    <form method="POST">

        <input type="text" id="name" name="name" placeholder="Faculty Name" required><br><br>

        <input type="email" id="email" name="email" placeholder="Email" required><br><br>

        <input type="text" id="phone" name="phone" placeholder="Phone Number" required><br><br>

        <input type="text" id="department" name="department" placeholder="Department" required><br><br>

        <input type="number" id="age" name="age" placeholder="Age" required><br><br>

        <input type="number" id="experience" name="experience" placeholder="Experience (Years)" required><br><br>

        <input type="text" id="subject" name="subject" placeholder="Subject Handled" required><br><br>

        <input type="text" id="availability" name="availability" placeholder="Availability" required><br><br>

        <button type="submit">Register</button>

    </form>
