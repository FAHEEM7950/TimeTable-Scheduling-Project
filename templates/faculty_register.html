<h1>Faculty Registration</h1>

   <form method="POST">

    <input type="text" name="employee_id" placeholder="Employee ID" required><br><br>

    <input type="text" name="full_name" placeholder="Faculty Name" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input type="password" name="password" placeholder="Password" required><br><br>

    <input type="text" name="phone" placeholder="Phone Number"><br><br>

    <input type="text" name="college_name" placeholder="College Name" required><br><br>

    <input type="text" name="department" placeholder="Department" required><br><br>

    <input type="text" name="subject_name" placeholder="Subject Name"><br><br>

    <button type="submit">Register</button>

</form>
