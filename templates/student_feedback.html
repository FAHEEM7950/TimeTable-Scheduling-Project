<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback - {{ college.college_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>

    <header>
        <h1>Automatic TimeTable Generator</h1>
        <div class="nav-links">
            <a href="/student_logout" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</a>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <div class="sidebar">
            <h3 class="sidebar-title">Student Panel</h3>
            <ul class="sidebar-menu">
                <li><a href="/student_dashboard" class="sidebar-link">Overview</a></li>
                <li><a href="/student_profile" class="sidebar-link">My Profile</a></li>
                <li><a href="/view_timetable" class="sidebar-link">My Timetable</a></li>
                <li><a href="/stress_form" class="sidebar-link">Fill Stress Form</a></li>
                <li><a href="/student_feedback" class="sidebar-link active">Submit Feedback</a></li>
            </ul>
        </div>

        <main class="main-content" style="max-width: 700px; margin: auto;">
            <h2 class="page-title">Submit Timetable Feedback</h2>

            {% if success %}
                <div class="message-box message-success">{{ success }}</div>
            {% endif %}

            <div style="background: var(--bg-secondary); border: 1px solid var(--glass-border); border-radius: 12px; padding: 2.5rem; margin-bottom: 2rem;">
                <form method="POST">
                    
                    <div class="form-group">
                        <label for="roll_no">Confirm Roll Number</label>
                        <input type="text" id="roll_no" name="roll_no" class="form-control" value="{{ student.roll_no }}" readonly>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message / Feedback</label>
                        <textarea id="message" name="message" class="form-control" rows="5" placeholder="Share your suggestions, schedule complaints, or swap requests..." required></textarea>
                    </div>

                    <button type="submit" class="btn" style="margin-top: 1rem;">Submit Feedback</button>
                </form>
            </div>

        </main>
    </div>

</body>
</html>
