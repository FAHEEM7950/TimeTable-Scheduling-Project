<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>

    <header>
        <h1>Automatic TimeTable Generator</h1>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container">
            <h2 class="form-title">Super Admin Login</h2>
            <p class="form-subtitle">Enter your college administrator credentials</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="email">College Admin Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="admin@college.edu" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Log In</button>
            </form>
        </div>
    </main>

</body>
</html>
