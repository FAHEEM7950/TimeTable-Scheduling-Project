<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
</head>
<body>

    <header>
        <h1>AI-Sched</h1>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container">
            <h2 class="form-title">Developer Portal</h2>
            <p class="form-subtitle">Enter your system developer credentials to access the global dashboard</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Developer Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="developer" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Log In</button>
            </form>
        </div>
    </main>

</body>
</html>
