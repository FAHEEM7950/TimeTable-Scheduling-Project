<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <header>
        <h1>AI-Sched</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <button id="theme-toggle" class="theme-switch" onclick="toggleTheme()">☀️ Light</button>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container">
            <h2 class="form-title">Developer Portal</h2>
            <p class="form-subtitle">Enter your registered developer credentials</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Developer Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="developer" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Log In</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                Don't have an account? <a href="/developer_register" style="color: var(--accent); text-decoration: none;">Register here</a>
            </p>
        </div>
    </main>

    <script>
        const btn = document.getElementById('theme-toggle');
        if (btn) { btn.innerText = document.body.classList.contains('light-mode') ? '🌙 Dark' : '☀️ Light'; }
        function toggleTheme() {
            const isL = document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', isL ? 'light' : 'dark');
            if (btn) btn.innerText = isL ? '🌙 Dark' : '☀️ Light';
        }
    </script>
</body>
</html>
