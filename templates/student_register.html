<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - {{ college.college_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
</head>
<body>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>

    <header>
        <h1>Automatic TimeTable Generator</h1>
        <div class="nav-links">
            <a href="/college_portal/{{ college.id }}">Back to Gateway</a>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container" style="max-width: 600px; padding: 2.5rem;">
            <h2 class="form-title">Student Registration</h2>
            <p class="form-subtitle">Register to view timetables and fill preferences for {{ college.college_name }}</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="college_id" value="{{ college.id }}">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" class="form-control" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Student Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="john.doe@college.edu" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" name="phone" class="form-control" placeholder="1234567890">
                    </div>

                    <div class="form-group">
                        <label for="branch">Branch / Dept</label>
                        <input type="text" id="branch" name="branch" class="form-control" placeholder="e.g. CSE" required>
                    </div>

                    <div class="form-group">
                        <label for="year_level">Year Level</label>
                        <select id="year_level" name="year_level" class="form-control" required>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="semester">Semester</label>
                        <select id="semester" name="semester" class="form-control" required>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="section_name">Section</label>
                        <select id="section_name" name="section_name" class="form-control" required>
                            <option value="" disabled selected>-- Select Section --</option>
                            {% if sections %}
                                {% for sec in sections %}
                                    <option value="{{ sec.section_name }}" data-branch="{{ sec.branch|upper }}" data-year="{{ sec.year_level }}">
                                        Section {{ sec.section_name }}
                                    </option>
                                {% endfor %}
                            {% endif %}
                        </select>
                    </div>

                    <div class="form-group" style="grid-column: span 2;">
                        <label for="roll_no">Roll Number</label>
                        <input type="text" id="roll_no" name="roll_no" class="form-control" placeholder="e.g. 21CS001" required>
                    </div>
                </div>

                <button type="submit" class="btn" style="margin-top: 1.5rem;">Register Student</button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const branchInput = document.getElementById('branch');
            const yearSelect = document.getElementById('year_level');
            const sectionSelect = document.getElementById('section_name');
            const semesterSelect = document.getElementById('semester');
            
            // Store all original section options
            const originalOptions = Array.from(sectionSelect.options);
            
            function filterSections() {
                const selectedBranch = branchInput.value.trim().toUpperCase();
                const selectedYear = yearSelect.value;
                
                // Clear current options
                sectionSelect.innerHTML = '';
                
                // Re-add matching options
                let matchedCount = 0;
                
                // First option is the placeholder
                const placeholder = originalOptions[0];
                sectionSelect.appendChild(placeholder);
                
                originalOptions.forEach((opt, idx) => {
                    if (idx === 0) return; // skip placeholder
                    
                    const optBranch = opt.getAttribute('data-branch') || '';
                    const optYear = opt.getAttribute('data-year') || '';
                    
                    if (optBranch === selectedBranch && optYear === selectedYear) {
                        sectionSelect.appendChild(opt.cloneNode(true));
                        matchedCount++;
                    }
                });
                
                if (matchedCount === 0) {
                    const noOpt = document.createElement('option');
                    noOpt.value = "";
                    noOpt.textContent = "No sections configured for " + (selectedBranch || 'this branch') + " Year " + selectedYear;
                    noOpt.disabled = true;
                    noOpt.selected = true;
                    sectionSelect.appendChild(noOpt);
                } else {
                    placeholder.selected = true;
                }
            }
            
            function updateSemesters() {
                const year = parseInt(yearSelect.value);
                const semA = (year - 1) * 2 + 1;
                const semB = (year - 1) * 2 + 2;
                
                semesterSelect.innerHTML = '';
                
                const optA = document.createElement('option');
                optA.value = semA;
                optA.textContent = "Semester " + semA;
                semesterSelect.appendChild(optA);
                
                const optB = document.createElement('option');
                optB.value = semB;
                optB.textContent = "Semester " + semB;
                semesterSelect.appendChild(optB);
            }
            
            branchInput.addEventListener('input', filterSections);
            yearSelect.addEventListener('change', function() {
                filterSections();
                updateSemesters();
            });
            
            // Initial run on load
            filterSections();
            updateSemesters();
        });
    </script>
</body>
</html>
