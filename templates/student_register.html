<!DOCTYPE html>
<html>
<head>
    <title>Student Register</title>
</head>
<body>

<h1>Student Registration</h1>

<form method="POST">

    <input type="text" name="full_name" placeholder="Full Name" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input type="password" name="password" placeholder="Password" required><br><br>

    <input type="text" name="college_name" placeholder="College Name" required><br><br>

    <input type="text" name="branch" placeholder="Branch" required><br><br>

    <input type="text" name="year_level" placeholder="Year" required><br><br>

    <input type="text" name="semester" placeholder="Semester" required><br><br>

    <input type="text" name="section_name" placeholder="Section" required><br><br>

    <input type="text" name="roll_no" placeholder="Roll Number"><br><br>

    <input type="text" name="phone" placeholder="Phone Number"><br><br>

    <button type="submit">Register</button>

</form>
