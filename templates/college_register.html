<!DOCTYPE html>
<html>
<head>
    <title>College Registration</title>
</head>
<body>

<h1>College Registration</h1>

<form method="POST">

    <input type="text"
           name="college_name"
           placeholder="College Name"
           required><br><br>

    <input type="text"
           name="college_code"
           placeholder="College Code"
           required><br><br>

    <input type="email"
           name="email"
           placeholder="College Email"
           required><br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required><br><br>

    <button type="submit">
        Register College
    </button>

</form>

</body>
</html>
