<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register College</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
    <script>
        // Apply theme immediately to prevent screen flashing
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>

    <header>
        <h1>Automatic TimeTable Generator</h1>
        <div class="nav-links">
            <a href="/developer_dashboard">&larr; Back to Dashboard</a>
            <button id="theme-toggle" class="theme-switch" onclick="toggleTheme()">☀️ Light</button>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container">
            <h2 class="form-title">Register Your College</h2>
            <p class="form-subtitle">Create a college space to schedule timetables for students and faculty</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="college_name">College Name</label>
                    <input type="text" id="college_name" name="college_name" class="form-control" placeholder="e.g. Stanford University" required>
                </div>

                <div class="form-group">
                    <label for="college_code">College Code (Unique)</label>
                    <input type="text" id="college_code" name="college_code" class="form-control" placeholder="e.g. STANFORD" required>
                </div>

                <div class="form-group">
                    <label for="college_photo">College Logo / Photo</label>
                    <input type="file" id="college_photo" name="college_photo" class="form-control" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="admin@stanford.edu" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Register College</button>
            </form>
        </div>
    </main>

    
</body>
</html>
