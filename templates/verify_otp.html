<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - {{ college.college_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style-index.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>

    <header>
        <h1>{{ college.college_name }} Portal</h1>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <div class="form-container">
            <h2 class="form-title">Enter OTP Code</h2>
            <p class="form-subtitle">We have sent a 4-digit code to your phone. (Please check the terminal console logs to find the OTP code)</p>

            {% if error %}
                <div class="message-box message-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="otp">4-Digit Code</label>
                    <input type="text" id="otp" name="otp" class="form-control" placeholder="1234" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5em;" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Verify & Login</button>
            </form>
        </div>
    </main>

</body>
</html>
